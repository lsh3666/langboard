services:
  vault:
    image: hashicorp/vault:1.15
    init: true
    container_name: ${PROJECT_NAME}_vault
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${KEY_PROVIDER_HASHICORP_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_CLUSTER_ADDR: "http://localhost:8201"
      VAULT_API_ADDR: "http://localhost:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_TOKEN: ${KEY_PROVIDER_HASHICORP_ROOT_TOKEN:-dev-root-token}
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./vault/entrypoint.sh:/entrypoint.sh:ro
      - ./volumes/.vault-credentials:/vault/.vault-credentials:rw
    networks:
      - net
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  vault-ui:
    image: djenriquez/vault-ui:latest
    container_name: ${PROJECT_NAME}_vault_ui
    ports:
      - "8080:8000"
    environment:
      VAULT_URL_DEFAULT: http://${PROJECT_NAME}_vault:8200
      VAULT_AUTH_DEFAULT: token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - net
    restart: unless-stopped

volumes:
  vault-data:
    driver: local
